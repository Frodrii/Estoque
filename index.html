<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Itens por Palete - Filtro Avançado</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 10px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        .filtros {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filtros > div {
            flex: 1 1 200px;
        }
        .filtros label {
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 5px;
        }
        .filtros input, .filtros select {
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .stats {
            background: #e9ecef;
            padding: 5px 15px;
            border-radius: 20px;
            color: #555;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
        }
        .bloco-palete {
            background: white;
            border-radius: 8px;
            margin-bottom: 25px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow-x: auto;
        }
        .titulo-palete {
            font-size: 1.3em;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            min-width: 900px;
        }
        th {
            background-color: #3498db;
            color: white;
            padding: 10px;
            text-align: left;
            white-space: nowrap;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            white-space: nowrap;
        }
        .codigo, .qtde { text-align: right; }
        .validade { text-align: center; }
        .erro, .vazio {
            text-align: center;
            padding: 40px;
            border-radius: 5px;
        }
        .erro { color: #e74c3c; background: #fadbd8; }
        .vazio { color: #777; background: #eee; font-style: italic; }

        /* Responsividade */
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .filtros { flex-direction: column; align-items: stretch; }
            .filtros > div { width: 100%; }
            .stats { align-self: flex-end; }
            .bloco-palete { padding: 10px; }
            .titulo-palete { font-size: 1.1em; }
            table { font-size: 0.8em; min-width: 700px; }
            th, td { padding: 5px; }
        }
        @media (max-width: 400px) {
            table { min-width: 600px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Itens Agrupados por Palete</h1>
        
        <div class="filtros">
            <div>
                <label for="busca">🔍 Buscar (código, produto, palete):</label>
                <input type="text" id="busca" placeholder="Ex: 127, BATATA, 00033835" autocomplete="off">
            </div>
            <div>
                <label for="mesAnoValidade">📅 Mês/Ano de validade:</label>
                <select id="mesAnoValidade">
                    <option value="todos">Todos os meses/anos</option>
                </select>
            </div>
            <div>
                <label for="tipoLocal">❄️ Tipo de Local:</label>
                <select id="tipoLocal">
                    <option value="todos">Todos</option>
                    <option value="congelada">Congelada (F01-F04, SORVETE)</option>
                    <option value="refrigerada">Refrigerada (demais)</option>
                </select>
            </div>
            <div class="stats" id="stats">0 itens exibidos</div>
        </div>

        <div id="status">Carregando dados...</div>
        <div id="conteudo"></div>
    </div>

    <script>
        // CONFIGURAÇÕES - ID da planilha e nome da aba
        const SHEET_ID = '1sxetmK0BUCeh1mk-_cGxESgn7XJSiVQ9R0UQQtXAEEY';
        const SHEET_NAME = 'DadosLimpos';
        const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`;

        // Mapeamento das colunas (use os nomes EXATOS da sua planilha)
        const COLUNAS = {
            codigo: 'Codigo',                // se for "Código" com acento, altere aqui
            produto: 'Produto',
            palete: 'Palete',
            qtde: 'Qtde Esperada',
            validade: 'Validade',
            dataEntrada: 'Data Entrada',
            recebimento: 'Recebimento',
            local: 'Locais vinculados'       // nome da coluna de local
        };

        // Função para classificar o local em congelada ou refrigerada
        function classificarLocal(localStr) {
            if (!localStr) return 'refrigerada'; // vazio = refrigerada por padrão
            const local = localStr.toUpperCase();
            // Congelada se começar com F01, F02, F03, F04 ou conter SORVETE
            if (local.startsWith('F01') || local.startsWith('F02') || local.startsWith('F03') || local.startsWith('F04') || local.includes('SORVETE')) {
                return 'congelada';
            }
            return 'refrigerada';
        }

        let dadosOriginais = [];
        let itensFiltrados = [];

        const statusDiv = document.getElementById('status');
        const conteudoDiv = document.getElementById('conteudo');
        const buscaInput = document.getElementById('busca');
        const mesAnoSelect = document.getElementById('mesAnoValidade');
        const tipoLocalSelect = document.getElementById('tipoLocal');
        const statsSpan = document.getElementById('stats');

        async function carregarDados() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`Erro HTTP: ${response.status}`);
                
                dadosOriginais = await response.json();
                if (dadosOriginais.length === 0) throw new Error('Nenhum dado encontrado');

                // Popula o filtro de mês/ano
                const mesesAnos = new Set();
                dadosOriginais.forEach(item => {
                    const validade = item[COLUNAS.validade];
                    if (validade) {
                        const partes = validade.split('/');
                        if (partes.length === 3) {
                            mesesAnos.add(`${partes[1]}/${partes[2]}`); // MM/AAAA
                        }
                    }
                });
                const mesesAnosArray = Array.from(mesesAnos).sort((a, b) => {
                    const [mesA, anoA] = a.split('/');
                    const [mesB, anoB] = b.split('/');
                    if (anoA !== anoB) return anoA - anoB;
                    return mesA - mesB;
                });
                mesesAnosArray.forEach(mesAno => {
                    const option = document.createElement('option');
                    option.value = mesAno;
                    option.textContent = mesAno;
                    mesAnoSelect.appendChild(option);
                });

                aplicarFiltros();
                statusDiv.style.display = 'none';
                
            } catch (error) {
                statusDiv.innerHTML = `<div class="erro">❌ Erro: ${error.message}</div>`;
            }
        }

        function aplicarFiltros() {
            const termoBusca = buscaInput.value.trim().toLowerCase();
            const mesAnoSelecionado = mesAnoSelect.value;
            const tipoLocalSelecionado = tipoLocalSelect.value;

            itensFiltrados = dadosOriginais.filter(item => {
                // Filtro por mês/ano
                if (mesAnoSelecionado !== 'todos') {
                    const validade = item[COLUNAS.validade] || '';
                    const partes = validade.split('/');
                    if (partes.length === 3) {
                        const mesAno = `${partes[1]}/${partes[2]}`;
                        if (mesAno !== mesAnoSelecionado) return false;
                    } else {
                        return false; // data inválida, não inclui
                    }
                }

                // Filtro por tipo de local
                if (tipoLocalSelecionado !== 'todos') {
                    const local = item[COLUNAS.local] || '';
                    const categoria = classificarLocal(local);
                    if (categoria !== tipoLocalSelecionado) return false;
                }

                // Filtro por busca textual
                if (termoBusca !== '') {
                    const codigo = (item[COLUNAS.codigo] || '').toString().toLowerCase();
                    const produto = (item[COLUNAS.produto] || '').toLowerCase();
                    const palete = (item[COLUNAS.palete] || '').toString().toLowerCase();
                    return codigo.includes(termoBusca) || produto.includes(termoBusca) || palete.includes(termoBusca);
                }

                return true;
            });

            atualizarStats();
            renderizar();
        }

        function atualizarStats() {
            statsSpan.textContent = `${itensFiltrados.length} itens exibidos`;
        }

        function renderizar() {
            if (itensFiltrados.length === 0) {
                conteudoDiv.innerHTML = '<div class="vazio">Nenhum item corresponde aos filtros.</div>';
                return;
            }

            // Agrupa por palete
            const paletes = {};
            itensFiltrados.forEach(item => {
                const numPalete = item[COLUNAS.palete] || 'SEM PALETE';
                if (!paletes[numPalete]) paletes[numPalete] = [];
                paletes[numPalete].push(item);
            });

            // Ordena paletes numericamente
            const paletesOrdenados = Object.keys(paletes).sort((a, b) => 
                a.localeCompare(b, undefined, { numeric: true })
            );

            let html = '';
            paletesOrdenados.forEach(num => {
                const itens = paletes[num];
                html += `<div class="bloco-palete">`;
                html += `<div class="titulo-palete">Palete: ${num}</div>`;
                html += `<table>`;
                html += `<thead><tr>
                            <th>Código</th><th>Produto</th><th>Qtde</th><th>Validade</th>
                            <th>Data Entrada</th><th>Recebimento</th><th>Local</th>
                        </tr></thead><tbody>`;

                itens.forEach(item => {
                    html += `<tr>
                        <td class="codigo">${item[COLUNAS.codigo] || ''}</td>
                        <td>${item[COLUNAS.produto] || ''}</td>
                        <td class="qtde">${item[COLUNAS.qtde] || '0'}</td>
                        <td class="validade">${item[COLUNAS.validade] || ''}</td>
                        <td>${item[COLUNAS.dataEntrada] || ''}</td>
                        <td>${item[COLUNAS.recebimento] || ''}</td>
                        <td>${item[COLUNAS.local] || ''}</td>
                    </tr>`;
                });

                html += `</tbody></table></div>`;
            });

            conteudoDiv.innerHTML = html;
        }

        // Event listeners para os filtros
        buscaInput.addEventListener('input', aplicarFiltros);
        mesAnoSelect.addEventListener('change', aplicarFiltros);
        tipoLocalSelect.addEventListener('change', aplicarFiltros);

        // Inicia o carregamento
        carregarDados();
    </script>
</body>
</html>
