<!DOCTYPE html>

    // ==================== FUNÇÕES AUXILIARES ====================
    function normalizarNumero(valor) {
        if (valor === undefined || valor === null || valor === '') return 0;
        if (typeof valor === 'number') return valor;
        const str = valor.toString().replace(/\./g, '').replace(',', '.');
        const num = parseFloat(str);
        return isNaN(num) ? 0 : num;
    }

    function parseDataBrasil(str) {
        if (!str) return null;
        const partes = str.split('/');
        if (partes.length !== 3) return null;
        const dia = parseInt(partes[0], 10);
        const mes = parseInt(partes[1], 10) - 1;
        const ano = parseInt(partes[2], 10);
        if (isNaN(dia) || isNaN(mes) || isNaN(ano)) return null;
        return new Date(ano, mes, dia);
    }

    function formatarDataBrasil(data) {
        if (!data) return '';
        try {
            const d = new Date(data);
            if (isNaN(d.getTime())) return data;
            return d.toLocaleDateString('pt-BR');
        } catch (e) { return data; }
    }

    function ordenarDados(dados, coluna, direcao, tipo = 'auto') {
        if (!coluna) return dados;
        return [...dados].sort((a, b) => {
            let valA = a[coluna] !== undefined ? a[coluna] : '';
            let valB = b[coluna] !== undefined ? b[coluna] : '';
            if (tipo === 'numero') {
                valA = normalizarNumero(valA);
                valB = normalizarNumero(valB);
                return direcao === 'asc' ? valA - valB : valB - valA;
            } else {
                valA = valA.toString().toLowerCase();
                valB = valB.toString().toLowerCase();
                return direcao === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
            }
        });
    }

    function getTipoColuna(aba, coluna) {
        if (aba === 'estoque') {
            const numericas = ['Estoque', 'Dias sem venda'];
            if (numericas.includes(coluna)) return 'numero';
        } else if (aba === 'produtos') {
            const numericas = ['totalVolume', 'numEntradas', 'diasMediaValidade', 'diasAteVencimentoMaisCurto', 'estoqueAtual'];
            if (numericas.includes(coluna)) return 'numero';
        } else if (aba === 'analise') {
            const numericas = ['estoque', 'diasSemVenda'];
            if (numericas.includes(coluna)) return 'numero';
        }
        return 'auto';
    }

    function atualizarMapasEstoque() {
        mapasGlobal.fornecedor.clear();

    // ==================== NOVA ABA 3: ANÁLISE DE PRODUTOS (agregado) ====================
    function aplicarFiltroProdutos() {
        const termo = buscaProdutos.value.trim().toLowerCase();
        const termoForn = buscaProdutosFornecedor.value.trim().toLowerCase();
        const filtroDias = filtroValidade.value;

        // Agrupar por código
        const agregado = new Map(); // key: codigo, value: objeto agregado

        for (const entrada of dadosPaletes) {
            const cod = entrada['Codigo']?.toString();
            if (!cod) continue;
            const produto = entrada['Produto'] || '';
            const qtde = normalizarNumero(entrada['Qtde Esperada']);
            const validadeStr = entrada['Validade'];
            const dataEntrada = entrada['Data Entrada'];
            const dataVal = parseDataBrasil(validadeStr);
            const hoje = new Date();

            if (!agregado.has(cod)) {
                agregado.set(cod, {
                    codigo: cod,
                    nome: produto,
                    totalVolume: 0,
                    numEntradas: 0,
                    ultimaEntrada: null,
                    validades: [],
                    ultimaDataValidade: null,
                    primeiraDataValidade: null
                });
            }
            const obj = agregado.get(cod);
            obj.totalVolume += qtde;
            obj.numEntradas++;
            if (dataEntrada && (!obj.ultimaEntrada || dataEntrada > obj.ultimaEntrada)) {
                obj.ultimaEntrada = dataEntrada;
            }
            if (dataVal) {
                obj.validades.push(dataVal);
                if (!obj.primeiraDataValidade || dataVal < obj.primeiraDataValidade) obj.primeiraDataValidade = dataVal;
                if (!obj.ultimaDataValidade || dataVal > obj.ultimaDataValidade) obj.ultimaDataValidade = dataVal;
            }
        }

        // Calcular métricas adicionais
        const produtos = [];
        for (const [cod, obj] of agregado.entries()) {
            // dias médios de validade (considerando as datas de validade)
            let mediaValidade = null;
            if (obj.validades.length > 0) {
                const somaDias = obj.validades.reduce((acc, d) => acc + d.getTime(), 0);
                const mediaMs = somaDias / obj.validades.length;
                mediaValidade = new Date(mediaMs);
            }
            // dias até o vencimento mais curto
            let diasAteVencimentoMaisCurto = null;
            if (obj.primeiraDataValidade) {
                const diff = obj.primeiraDataValidade - new Date();
                diasAteVencimentoMaisCurto = Math.ceil(diff / (1000 * 3600 * 24));
            }
            // dias até o vencimento mais longo
            let diasAteVencimentoMaisLongo = null;
            if (obj.ultimaDataValidade) {
                const diff = obj.ultimaDataValidade - new Date();
                diasAteVencimentoMaisLongo = Math.ceil(diff / (1000 * 3600 * 24));
            }
            // média de dias de validade (diferença entre data de entrada e validade) - opcional
            let mediaDiasValidade = null;
            if (obj.validades.length > 0 && obj.ultimaEntrada) {
                const dataEntradaRef = parseDataBrasil(obj.ultimaEntrada);
                if (dataEntradaRef) {
                    const soma = obj.validades.reduce((acc, d) => acc + (d - dataEntradaRef), 0);
                    mediaDiasValidade = Math.ceil(soma / obj.validades.length / (1000 * 3600 * 24));
                }
            }

            // Obter fornecedor do mapa (se disponível)
            const fornecedor = mapasGlobal.fornecedor.get(cod) || '';
            const estoqueAtual = mapasGlobal.estoque.get(cod) || 0;
            const diasSemVenda = mapasGlobal.diasSemVenda.get(cod) || 0;

            produtos.push({
                codigo: cod,
                nome: obj.nome,
                fornecedor: fornecedor,
                totalVolume: obj.totalVolume,
                numEntradas: obj.numEntradas,
                ultimaEntrada: obj.ultimaEntrada || '',
                validadeMaisCurta: obj.primeiraDataValidade ? formatarDataBrasil(obj.primeiraDataValidade) : '',
                validadeMaisLonga: obj.ultimaDataValidade ? formatarDataBrasil(obj.ultimaDataValidade) : '',
                diasAteVencimentoMaisCurto: diasAteVencimentoMaisCurto,
                diasAteVencimentoMaisLongo: diasAteVencimentoMaisLongo,
                mediaDiasValidade: mediaDiasValidade,
                estoqueAtual: estoqueAtual,
                diasSemVenda: diasSemVenda
            });
        }

        // Aplicar filtros de busca e validade
        let filtrados = produtos.filter(p => {
            let match = true;
            if (termo) {
                match = match && (p.codigo.includes(termo) || p.nome.toLowerCase().includes(termo));
            }
            if (termoForn) {
                match = match && p.fornecedor.toLowerCase().includes(termoForn);
            }
            if (filtroDias !== 'todos') {
                const limite = parseInt(filtroDias);
                if (p.diasAteVencimentoMaisCurto !== null && p.diasAteVencimentoMaisCurto <= limite) {
                    // ok, mantém
                } else {
                    match = false;
                }
            }
            return match;
        });

        statsProdutos.textContent = `${filtrados.length} produtos exibidos`;
        paginacao.produtos.dadosFiltrados = filtrados;
        paginacao.produtos.totalPaginas = Math.ceil(filtrados.length / ITENS_POR_PAGINA);
        paginacao.produtos.paginaAtual = 1;
        renderizarProdutos();
    }

        if (totalPaginas > 1) {
            paginacaoProdutosDiv.style.display = 'flex';
            paginacaoProdutosDiv.innerHTML = gerarBotoesPaginacao(paginacao.produtos.paginaAtual, totalPaginas, 'produtos');
        } else {
            paginacaoProdutosDiv.style.display = 'none';
        }
    }

    // ==================== ABA 4: Análise de Estoque (original, sem alterações significativas) ====================
    function carregarPreferenciasAnalise() {
        const savedColunas = localStorage.getItem('analise_colunas');
        if (savedColunas) {
            colunasVisiveis = JSON.parse(savedColunas);
        } else {
            colunasVisiveis = todasColunasAnalise.filter(c => c.padrao).map(c => c.campo);
        }
    }

    function abrirModalColunas() {
        checklistDiv.innerHTML = '';
        todasColunasAnalise.forEach(col => {
            const label = document.createElement('label');
            const chk = document.createElement('input');
            chk.type = 'checkbox';
            chk.value = col.campo;
            chk.checked = colunasVisiveis.includes(col.campo);
            label.appendChild(chk);
            label.appendChild(document.createTextNode(' ' + col.label));
            checklistDiv.appendChild(label);
            label.style.display = 'block';
            label.style.margin = '8px 0';
        });
        modalColunas.classList.add('ativo');
    }

    function fecharModalColunas() {
        modalColunas.classList.remove('ativo');
    }

    function salvarColunasModal() {
        const checkboxes = checklistDiv.querySelectorAll('input[type="checkbox"]');
        colunasVisiveis = [];
        checkboxes.forEach(chk => {
            if (chk.checked) colunasVisiveis.push(chk.value);
        });
        localStorage.setItem('analise_colunas', JSON.stringify(colunasVisiveis));
        fecharModalColunas();
        aplicarFiltroAnalise();
    }

    function aplicarFiltroAnalise() {
        const termo = buscaAnalise.value.trim().toLowerCase();
        const termoForn = buscaAnaliseFornecedor.value.trim().toLowerCase();
        const hoje = new Date();

        if (!dadosEstoque || dadosEstoque.length === 0) {
            stats.analise.textContent = '0 itens analisados';
            conteudoDivs.analise.innerHTML = '<div class="vazio">Nenhum dado de estoque carregado.</div>';
            paginacaoDivs.analise.style.display = 'none';
            return;
        }

        const analise = [];
        for (const est of dadosEstoque) {
            const cod = est['Codigo']?.toString();
            if (!cod) continue;
            const estoque = normalizarNumero(est['Estoque']);
            const diasSemVenda = parseInt(est['Dias sem venda']) || 0;
            const ultimaCompraStr = est['Última Compra'] || '';
            const ultimaCompraDate = parseDataBrasil(ultimaCompraStr);
            const diasUltimaCompra = ultimaCompraDate ? Math.floor((hoje - ultimaCompraDate) / (1000 * 3600 * 24)) : null;

            let sugestao = 'OK';
            let motivo = '';
            if (estoque > 0 && diasSemVenda > 60) {
                sugestao = '⚠️ Baixo giro';
                motivo = `Dias sem venda: ${diasSemVenda}`;
            } else if (diasUltimaCompra !== null && diasUltimaCompra > 180) {
                sugestao = '⚠️ Última compra antiga';
                motivo = `Última compra: ${ultimaCompraStr} (${diasUltimaCompra} dias)`;
            } else if (estoque === 0 && diasSemVenda > 30) {
                sugestao = 'ℹ️ Sem estoque, mas com venda há mais de 30 dias';
                motivo = `Dias sem venda: ${diasSemVenda}`;
            }

            const fornecedor = est['Fornecedor'] || '';
            let match = true;
            if (termo) match = match && (cod.includes(termo) || (est['Nome'] || '').toLowerCase().includes(termo));
            if (termoForn) match = match && fornecedor.toLowerCase().includes(termoForn);
            if (match) {
                analise.push({
                    codigo: cod,
                    nome: est['Nome'] || '',
                    fornecedor: fornecedor,
                    estoque: estoque,
                    diasSemVenda: diasSemVenda,
                    ultimaCompra: ultimaCompraStr,
                    sugestao: sugestao,
                    motivo: motivo
                });
            }
        }

        let filtrados = analise;

        if (!ordenacao.analise.coluna) {
            filtrados.sort((a, b) => {
                if (a.sugestao !== 'OK' && b.sugestao === 'OK') return -1;
                if (a.sugestao === 'OK' && b.sugestao !== 'OK') return 1;
                return b.diasSemVenda - a.diasSemVenda;
            });
        } else {
            const tipo = getTipoColuna('analise', ordenacao.analise.coluna);
            filtrados = ordenarDados(filtrados, ordenacao.analise.coluna, ordenacao.analise.direcao, tipo);
        }

        stats.analise.textContent = `${filtrados.length} itens analisados`;
        paginacao.analise.dadosFiltrados = filtrados;
        paginacao.analise.totalPaginas = Math.ceil(filtrados.length / ITENS_POR_PAGINA);
        paginacao.analise.paginaAtual = 1;
        renderizarAnalise();
    }

    function renderizarAnalise() {
        const { dadosFiltrados, paginaAtual, totalPaginas } = paginacao.analise;
        const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
        const fim = inicio + ITENS_POR_PAGINA;
        const paginaDados = dadosFiltrados.slice(inicio, fim);

        if (!paginaDados.length) {
            conteudoDivs.analise.innerHTML = '<div class="vazio">Nenhum item corresponde.</div>';
            paginacaoDivs.analise.style.display = 'none';
            return;
        }

        if (visao.analise === 'tabela') {
            let html = `<div class="tabela-wrapper"><table id="tabela-analise"><thead>`;
            for (const col of todasColunasAnalise) {
                if (colunasVisiveis.includes(col.campo)) {
                    html += `<th>${col.label} <span class="ordenar-btn" data-coluna="${col.campo}">⇅</span></th>`;
                }
            }
            html += `</thead><tbody>`;
            for (const a of paginaDados) {
                let classe = a.sugestao !== 'OK' ? 'negativo' : '';
                html += `<tr class="${classe}">`;
                for (const col of todasColunasAnalise) {
                    if (colunasVisiveis.includes(col.campo)) {
                        let valor = a[col.campo];
                        if (col.campo === 'estoque' || col.campo === 'diasSemVenda') {
                            html += `<td class="qtde">${valor}</td>`;
                        } else {
                            html += `<td>${valor}</td>`;
                        }
                    }
                }
                html += `</tr>`;
            }
            html += `</tbody></table></div>`;
            conteudoDivs.analise.innerHTML = html;

            document.querySelectorAll('#tabela-analise th .ordenar-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    const col = btn.dataset.coluna;
                    const tipo = getTipoColuna('analise', col);
                    if (ordenacao.analise.coluna === col) {
                        ordenacao.analise.direcao = ordenacao.analise.direcao === 'asc' ? 'desc' : 'asc';
                    } else {
                        ordenacao.analise.coluna = col;
                        ordenacao.analise.direcao = 'asc';
                    }
                    const novosOrdenados = ordenarDados(paginacao.analise.dadosFiltrados, ordenacao.analise.coluna, ordenacao.analise.direcao, tipo);
                    paginacao.analise.dadosFiltrados = novosOrdenados;
                    paginacao.analise.paginaAtual = 1;
                    renderizarAnalise();
                });
            });
        } else {
            let html = `<div class="cards-view">`;
            for (const a of paginaDados) {
                let classe = a.sugestao !== 'OK' ? 'negativo' : '';
                html += `<div class="card-item ${classe}">`;
                for (const col of todasColunasAnalise) {
                    if (colunasVisiveis.includes(col.campo)) {
                        let valor = a[col.campo];
                        if (col.campo === 'sugestao') {
                            html += `<div class="card-linha sugestao"><span class="label">${col.label}:</span><span class="valor">${valor}</span></div>`;
                        } else {
                            html += `<div class="card-linha"><span class="label">${col.label}:</span><span class="valor">${valor}</span></div>`;
                        }
                    }
                }
                if (a.sugestao !== 'OK' && a.motivo && !colunasVisiveis.includes('motivo')) {
                    html += `<div class="card-linha motivo"><span class="label">Detalhe:</span><span class="valor">${a.motivo}</span></div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
            conteudoDivs.analise.innerHTML = html;
        }

        if (totalPaginas > 1) {
            paginacaoDivs.analise.style.display = 'flex';
            paginacaoDivs.analise.innerHTML = gerarBotoesPaginacao(paginacao.analise.paginaAtual, totalPaginas, 'analise');
        } else {
            paginacaoDivs.analise.style.display = 'none';
        }
    }

    // ==================== PAGINAÇÃO ====================
    function gerarBotoesPaginacao(paginaAtual, totalPaginas, aba) {
        let botoes = '';
        for (let i = 1; i <= totalPaginas; i++) {
            if (i === 1 || i === totalPaginas || (i >= paginaAtual - 2 && i <= paginaAtual + 2)) {
                botoes += `<button class="pag-btn ${i === paginaAtual ? 'ativo' : ''}" data-pagina="${i}" data-aba="${aba}">${i}</button>`;
            } else if (i === paginaAtual - 3 || i === paginaAtual + 3) {
                botoes += `<span>...</span>`;
            }
        }
        return botoes;
    }

    function mudarPagina(aba, pagina) {
        if (!paginacao[aba]) return;
        paginacao[aba].paginaAtual = pagina;
        if (aba === 'codbalanca') renderizarCodBalanca();
        else if (aba === 'estoque') renderizarEstoque();
        else if (aba === 'produtos') renderizarProdutos();
        else if (aba === 'analise') renderizarAnalise();
    }

    // ==================== PREFERÊNCIAS DE VISUALIZAÇÃO ====================
    function carregarPreferenciasVisao() {
        const storedVisaoCod = localStorage.getItem('visao_codbalanca');
        if (storedVisaoCod === 'cards' || storedVisaoCod === 'tabela') visao.codbalanca = storedVisaoCod;
        const storedVisaoEst = localStorage.getItem('visao_estoque');
        if (storedVisaoEst === 'cards' || storedVisaoEst === 'tabela') visao.estoque = storedVisaoEst;
        const storedVisaoProd = localStorage.getItem('visao_produtos');
        if (storedVisaoProd === 'cards' || storedVisaoProd === 'tabela') visao.produtos = storedVisaoProd;
        const storedVisaoAnal = localStorage.getItem('visao_analise');
        if (storedVisaoAnal === 'cards' || storedVisaoAnal === 'tabela') visao.analise = storedVisaoAnal;
        atualizarBotoesVisao();
    }

    function atualizarBotoesVisao() {
        if (btnVisaoCodBalanca) btnVisaoCodBalanca.innerHTML = visao.codbalanca === 'tabela' ? '🃏 Ver como Cards' : '📋 Ver como Tabela';
        if (btnVisaoEstoque) btnVisaoEstoque.innerHTML = visao.estoque === 'tabela' ? '🃏 Ver como Cards' : '📋 Ver como Tabela';
        if (btnVisaoProdutos) btnVisaoProdutos.innerHTML = visao.produtos === 'tabela' ? '🃏 Ver como Cards' : '📋 Ver como Tabela';
        if (btnVisaoAnalise) btnVisaoAnalise.innerHTML = visao.analise === 'tabela' ? '🃏 Ver como Cards' : '📋 Ver como Tabela';
    }

    function alternarVisao(aba) {
        if (aba === 'codbalanca') {
            visao.codbalanca = visao.codbalanca === 'tabela' ? 'cards' : 'tabela';
            localStorage.setItem('visao_codbalanca', visao.codbalanca);
            aplicarFiltroCodBalanca();
        } else if (aba === 'estoque') {
            visao.estoque = visao.estoque === 'tabela' ? 'cards' : 'tabela';
            localStorage.setItem('visao_estoque', visao.estoque);
            aplicarFiltroEstoque();
        } else if (aba === 'produtos') {
            visao.produtos = visao.produtos === 'tabela' ? 'cards' : 'tabela';
            localStorage.setItem('visao_produtos', visao.produtos);
            renderizarProdutos();
        } else if (aba === 'analise') {
            visao.analise = visao.analise === 'tabela' ? 'cards' : 'tabela';
            localStorage.setItem('visao_analise', visao.analise);
            aplicarFiltroAnalise();
        }
        atualizarBotoesVisao();
    }

    // ==================== EVENTOS ====================
    function trocarAba(abaId) {
        for (const [id, el] of Object.entries(conteudos)) {
            el.classList.toggle('ativo', id === abaId);
        }
        abaBtns.forEach(btn => {
            btn.classList.toggle('ativo', btn.dataset.aba === abaId);
        });
        if (abaId === 'analise') {
            carregarAnalise();
        }
    }

    abaBtns.forEach(btn => btn.addEventListener('click', () => trocarAba(btn.dataset.aba)));
    buscaCod.addEventListener('input', aplicarFiltroCodBalanca);
    buscaEst.addEventListener('input', aplicarFiltroEstoque);
    buscaEstFornecedor.addEventListener('input', aplicarFiltroEstoque);
    buscaAnalise.addEventListener('input', aplicarFiltroAnalise);
    buscaAnaliseFornecedor.addEventListener('input', aplicarFiltroAnalise);
    btnBuscarProdutos.addEventListener('click', () => aplicarFiltroProdutos());
    btnVisaoProdutos.addEventListener('click', () => alternarVisao('produtos'));

    btnVisaoCodBalanca.addEventListener('click', () => alternarVisao('codbalanca'));
    btnVisaoEstoque.addEventListener('click', () => alternarVisao('estoque'));
    btnVisaoAnalise.addEventListener('click', () => alternarVisao('analise'));

    btnConfigColunas.addEventListener('click', abrirModalColunas);
    fecharModal.addEventListener('click', fecharModalColunas);
    salvarColunasBtn.addEventListener('click', salvarColunasModal);

    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('pag-btn')) {
            const pagina = parseInt(e.target.dataset.pagina);
            const aba = e.target.dataset.aba;
            if (!isNaN(pagina) && aba) mudarPagina(aba, pagina);
        }
    });

    // ==================== INICIALIZAÇÃO ====================
    carregarPreferenciasVisao();
    carregarPreferenciasAnalise();
    Promise.allSettled([
        carregarAtualizada(),
        carregarCodBalanca(),
        carregarEstoque(),
        carregarPaletes()
    ]).then(() => {
        console.log('Carregamento concluído');
    });
</script>
